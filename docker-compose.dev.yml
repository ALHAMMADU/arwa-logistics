version: "3.9"

# Lightweight development compose — runs infrastructure only (no app)
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  # ─── PostgreSQL 16 ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: arwa_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arwa_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-arwa_logistics}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arwa} -d ${POSTGRES_DB:-arwa_logistics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ─── Redis 7 ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arwa_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-arwa_redis_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-arwa_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ─── RabbitMQ 3 Management ────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: arwa_rabbitmq_dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-arwa}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-arwa_rabbitmq_2026}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - app-network

# ─── Networks ──────────────────────────────────────────
networks:
  app-network:
    driver: bridge
    name: arwa-network-dev

# ─── Volumes ───────────────────────────────────────────
volumes:
  postgres-data:
    name: arwa_postgres_data_dev
  redis-data:
    name: arwa_redis_data_dev
  rabbitmq-data:
    name: arwa_rabbitmq_data_dev
